[platformio]
default_envs = seeed_xiao_esp32s3

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
build_type = debug
monitor_filters = 
	default
	esp32_exception_decoder
lib_deps =
;    lib/FastLED ; modified fe389a4
 	https://github.com/FastLED/FastLED.git
;    C:\Users\Jeff\Downloads\FastLED-b953de01ed160c6983cd9bf89d5536443cf7a427.zip ; from 260306
;    C:\Users\Jeff\Downloads\FastLED-fe389a40ba2ab730aa1de82d883f0bdb3b22f226.zip ; from 260306
;    C:\Users\Jeff\Downloads\FastLED-8ec0391db1d07aecffc9bac9b642ba2a8bd149a5.zip
build_flags =
    -DDEBUG
    -DCORE_DEBUG_LEVEL=0
    -DLOG_LOCAL_LEVEL=ESP_LOG_VERBOSE
    -DBOARD_HAS_PSRAM

[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3
build_flags = 
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
;	-DARDUINO_USB_MODE=0 ; Serial is native USB CDC (TinyUSB).
	-DARDUINO_USB_MODE=1 ;→ Serial is USB Serial/JTAG (hardware CDC).
